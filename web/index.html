<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SID Forms — Beautiful Form Builder</title>
<style>
/* ========== Reset & Variables ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --surface3: #282828;
  --border: #333;
  --text: #f0f0f0;
  --text2: #999;
  --accent: #6366f1;
  --accent-light: #818cf8;
  --accent-dark: #4f46e5;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ========== Layout ========== */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: white;
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ========== Left Panel (Editor) ========== */
.panel-left {
  width: 420px;
  min-width: 420px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-tab {
  flex: 1;
  padding: 12px 16px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: var(--transition);
}

.panel-tab:hover { color: var(--text); }
.panel-tab.active {
  color: var(--accent-light);
  border-bottom-color: var(--accent);
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.panel-content::-webkit-scrollbar { width: 6px; }
.panel-content::-webkit-scrollbar-track { background: transparent; }
.panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ========== AI Chat Section ========== */
.ai-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.ai-input-wrap {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.ai-input {
  flex: 1;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  resize: none;
  min-height: 40px;
  max-height: 100px;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
}

.ai-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.ai-input::placeholder { color: var(--text2); }

/* ========== Buttons ========== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: var(--transition);
  white-space: nowrap;
  font-family: inherit;
}

.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--surface3); border-color: var(--text2); }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  padding: 6px 10px;
}
.btn-ghost:hover { color: var(--text); background: var(--surface2); }

.btn-danger {
  background: transparent;
  color: var(--danger);
  padding: 6px 10px;
}
.btn-danger:hover { background: rgba(239, 68, 68, 0.1); }

.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  border-radius: var(--radius-sm);
}

.btn-publish {
  background: linear-gradient(135deg, var(--accent), #a855f7);
  color: white;
  padding: 8px 20px;
}
.btn-publish:hover { opacity: 0.9; transform: translateY(-1px); }

/* ========== Form Title Section ========== */
.form-title-section {
  margin-bottom: 20px;
}

.form-title-input {
  width: 100%;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 16px;
  font-weight: 700;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
}

.form-title-input:focus { border-color: var(--accent); }

.form-desc-input {
  width: 100%;
  padding: 8px 12px;
  margin-top: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 13px;
  outline: none;
  resize: none;
  min-height: 36px;
  transition: var(--transition);
  font-family: inherit;
}

.form-desc-input:focus { border-color: var(--accent); color: var(--text); }

/* ========== Question Cards ========== */
.question-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.question-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: grab;
  transition: var(--transition);
  position: relative;
}

.question-card:hover { border-color: var(--text2); }
.question-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.question-card.dragging { opacity: 0.5; }
.question-card.drag-over { border-color: var(--accent-light); border-style: dashed; }

.question-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.question-drag {
  color: var(--text2);
  cursor: grab;
  font-size: 14px;
  flex-shrink: 0;
}

.question-type-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--accent-glow);
  color: var(--accent-light);
  font-weight: 600;
}

.question-actions {
  margin-left: auto;
  display: flex;
  gap: 4px;
}

.question-label-input {
  width: 100%;
  padding: 6px 8px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
}

.question-label-input:hover { border-color: var(--border); }
.question-label-input:focus { border-color: var(--accent); background: var(--bg); }

.question-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
}

.question-meta label {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}

.question-meta select {
  padding: 4px 8px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  font-family: inherit;
}

/* Toggle switch */
.toggle {
  position: relative;
  width: 34px;
  height: 20px;
  flex-shrink: 0;
}

.toggle input { display: none; }

.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--surface3);
  border-radius: 10px;
  cursor: pointer;
  transition: var(--transition);
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 2px;
  top: 2px;
  background: white;
  border-radius: 50%;
  transition: var(--transition);
}

.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(14px); }

/* Options editor */
.options-editor {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.option-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.option-input {
  flex: 1;
  padding: 5px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  font-family: inherit;
}

.option-input:focus { border-color: var(--accent); }

.add-option-btn {
  padding: 4px 8px;
  font-size: 12px;
  color: var(--accent-light);
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: var(--transition);
  margin-top: 4px;
  font-family: inherit;
}

.add-option-btn:hover { border-color: var(--accent); background: var(--accent-glow); }

/* Add question button */
.add-question-area {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.add-q-btn {
  padding: 8px 12px;
  font-size: 12px;
  background: var(--surface2);
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}

.add-q-btn:hover {
  border-color: var(--accent);
  color: var(--accent-light);
  background: var(--accent-glow);
}

/* ========== Design Tab ========== */
.design-group {
  margin-bottom: 20px;
}

.design-group-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
  margin-bottom: 10px;
}

.theme-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.theme-card {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  cursor: pointer;
  transition: var(--transition);
  overflow: hidden;
  position: relative;
}

.theme-card:hover { border-color: var(--text2); transform: scale(1.03); }
.theme-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

.theme-card-inner {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 8px;
}

.theme-card-name {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 4px;
  font-size: 10px;
  font-weight: 600;
  text-align: center;
  background: rgba(0,0,0,0.6);
  color: white;
}

.color-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.color-row label {
  font-size: 13px;
  color: var(--text2);
  min-width: 80px;
}

.color-picker {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 2px solid var(--border);
  cursor: pointer;
  padding: 0;
  overflow: hidden;
}

.color-picker::-webkit-color-swatch-wrapper { padding: 0; }
.color-picker::-webkit-color-swatch { border: none; border-radius: 6px; }

.font-select {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  outline: none;
  margin-bottom: 10px;
  font-family: inherit;
}

/* ========== Settings Tab ========== */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.setting-label {
  font-size: 13px;
  font-weight: 600;
}

.setting-desc {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}

.setting-input {
  padding: 6px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  width: 160px;
  outline: none;
  font-family: inherit;
}

.setting-input:focus { border-color: var(--accent); }

/* ========== Right Panel (Preview) ========== */
.panel-right {
  flex: 1;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.preview-toolbar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.device-btn {
  padding: 6px 12px;
  font-size: 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}

.device-btn:hover { color: var(--text); border-color: var(--text2); }
.device-btn.active { color: var(--accent-light); border-color: var(--accent); background: var(--accent-glow); }

.preview-container {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px;
  overflow-y: auto;
}

.preview-frame {
  width: 100%;
  max-width: 800px;
  min-height: 600px;
  border-radius: var(--radius);
  overflow: hidden;
  transition: max-width 0.3s ease;
  box-shadow: var(--shadow);
}

.preview-frame.mobile { max-width: 375px; }
.preview-frame.tablet { max-width: 768px; }

.preview-iframe {
  width: 100%;
  min-height: 600px;
  border: none;
  border-radius: var(--radius);
}

/* ========== Modal ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.active { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  width: 480px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}

.modal h2 {
  font-size: 18px;
  margin-bottom: 16px;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}

/* ========== Loading ========== */
.ai-loading {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--accent-light);
}

.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--accent-glow);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ========== Toast ========== */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  z-index: 2000;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s ease;
}

.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--danger); color: white; }

/* ========== Responsive ========== */
@media (max-width: 900px) {
  .main { flex-direction: column; }
  .panel-left { width: 100%; min-width: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
}
</style>

<!-- Inter font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Playfair+Display:wght@700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">S</div>
      <span>SID Forms</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="exportHTML()">HTML出力</button>
      <button class="btn btn-publish" onclick="showPublishModal()">公開する</button>
    </div>
  </header>

  <div class="main">
    <!-- Left Panel -->
    <div class="panel-left">
      <!-- AI Section -->
      <div class="ai-section">
        <div class="ai-input-wrap">
          <textarea class="ai-input" id="aiInput" rows="1"
            placeholder="AIに指示: 「美容院向けの予約フォーム」「もっとカジュアルに」"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();generateWithAI()}"></textarea>
          <button class="btn btn-primary btn-icon" onclick="generateWithAI()" id="aiBtn" title="AI生成">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </button>
        </div>
        <div id="aiStatus"></div>
      </div>

      <!-- Tabs -->
      <div class="panel-tabs">
        <div class="panel-tab active" data-tab="questions" onclick="switchTab('questions')">質問</div>
        <div class="panel-tab" data-tab="design" onclick="switchTab('design')">デザイン</div>
        <div class="panel-tab" data-tab="settings" onclick="switchTab('settings')">設定</div>
      </div>

      <!-- Tab Content: Questions -->
      <div class="panel-content" id="tab-questions">
        <div class="form-title-section">
          <input class="form-title-input" id="formTitle" value="お問い合わせフォーム" oninput="updatePreview()">
          <textarea class="form-desc-input" id="formDesc" rows="1" placeholder="フォームの説明（任意）" oninput="updatePreview()">お気軽にお問い合わせください</textarea>
        </div>

        <div class="question-list" id="questionList"></div>

        <div class="add-question-area">
          <button class="add-q-btn" onclick="addQuestion('text')">+ テキスト</button>
          <button class="add-q-btn" onclick="addQuestion('email')">+ メール</button>
          <button class="add-q-btn" onclick="addQuestion('tel')">+ 電話番号</button>
          <button class="add-q-btn" onclick="addQuestion('textarea')">+ 長文</button>
          <button class="add-q-btn" onclick="addQuestion('select')">+ ドロップダウン</button>
          <button class="add-q-btn" onclick="addQuestion('radio')">+ ラジオ</button>
          <button class="add-q-btn" onclick="addQuestion('checkbox')">+ チェック</button>
          <button class="add-q-btn" onclick="addQuestion('date')">+ 日付</button>
          <button class="add-q-btn" onclick="addQuestion('number')">+ 数値</button>
        </div>
      </div>

      <!-- Tab Content: Design -->
      <div class="panel-content" id="tab-design" style="display:none">
        <div class="design-group">
          <div class="design-group-title">テーマ</div>
          <div class="theme-grid" id="themeGrid"></div>
        </div>

        <div class="design-group">
          <div class="design-group-title">カラー</div>
          <div class="color-row">
            <label>メインカラー</label>
            <input type="color" class="color-picker" id="colorPrimary" value="#6366f1" onchange="updateThemeColor('primary', this.value)">
          </div>
          <div class="color-row">
            <label>背景色</label>
            <input type="color" class="color-picker" id="colorBg" value="#ffffff" onchange="updateThemeColor('bg', this.value)">
          </div>
          <div class="color-row">
            <label>文字色</label>
            <input type="color" class="color-picker" id="colorText" value="#1a1a1a" onchange="updateThemeColor('text', this.value)">
          </div>
        </div>

        <div class="design-group">
          <div class="design-group-title">フォント</div>
          <select class="font-select" id="fontSelect" onchange="updateFont(this.value)">
            <option value="'Inter', sans-serif">Inter（モダン）</option>
            <option value="'Noto Sans JP', sans-serif">Noto Sans JP（読みやすい）</option>
            <option value="'Space Grotesk', sans-serif">Space Grotesk（テック）</option>
            <option value="'Playfair Display', serif">Playfair Display（エレガント）</option>
            <option value="system-ui, sans-serif">システムフォント</option>
          </select>
        </div>

        <div class="design-group">
          <div class="design-group-title">スタイル</div>
          <div class="color-row">
            <label>角丸</label>
            <input type="range" min="0" max="24" value="12" id="borderRadius" oninput="updateStyle()">
          </div>
          <div class="color-row">
            <label>余白</label>
            <input type="range" min="16" max="80" value="40" id="paddingSize" oninput="updateStyle()">
          </div>
        </div>
      </div>

      <!-- Tab Content: Settings -->
      <div class="panel-content" id="tab-settings" style="display:none">
        <div class="setting-row">
          <div>
            <div class="setting-label">Google Sheets連携</div>
            <div class="setting-desc">回答をSpreadsheetに送信</div>
          </div>
          <input class="setting-input" id="sheetsId" placeholder="Spreadsheet ID">
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">送信後メッセージ</div>
            <div class="setting-desc">送信完了時の表示</div>
          </div>
          <input class="setting-input" id="thankYouMsg" value="ありがとうございました！" oninput="updatePreview()">
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">回答期限</div>
            <div class="setting-desc">この日以降は受付終了</div>
          </div>
          <input class="setting-input" type="date" id="deadline">
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">回答上限</div>
            <div class="setting-desc">上限数に達したら自動クローズ</div>
          </div>
          <input class="setting-input" type="number" id="maxResponses" placeholder="無制限" min="1">
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">reCAPTCHA</div>
            <div class="setting-desc">ボット対策</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="recaptchaToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">Claude APIキー</div>
            <div class="setting-desc">AI機能に使用（ローカル保存のみ）</div>
          </div>
          <input class="setting-input" type="password" id="apiKey" placeholder="sk-ant-..." onchange="saveApiKey()">
        </div>
      </div>
    </div>

    <!-- Right Panel (Preview) -->
    <div class="panel-right">
      <div class="preview-toolbar">
        <button class="device-btn active" data-device="desktop" onclick="setDevice('desktop')">Desktop</button>
        <button class="device-btn" data-device="tablet" onclick="setDevice('tablet')">Tablet</button>
        <button class="device-btn" data-device="mobile" onclick="setDevice('mobile')">Mobile</button>
      </div>
      <div class="preview-container">
        <div class="preview-frame" id="previewFrame">
          <iframe class="preview-iframe" id="previewIframe"></iframe>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Publish Modal -->
<div class="modal-overlay" id="publishModal">
  <div class="modal">
    <h2>フォームを公開</h2>
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">生成されたHTMLファイルをダウンロードして、GitHub Pages・Cloudflare Pages・Google Driveなどで公開できます。</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closePublishModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="exportHTML()">HTMLダウンロード</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ========== State ==========
let formState = {
  title: 'お問い合わせフォーム',
  description: 'お気軽にお問い合わせください',
  questions: [
    { id: 'q1', type: 'text', label: 'お名前', required: true, placeholder: '山田太郎' },
    { id: 'q2', type: 'email', label: 'メールアドレス', required: true, placeholder: 'name@example.com' },
    { id: 'q3', type: 'tel', label: '電話番号', required: false, placeholder: '090-1234-5678' },
    { id: 'q4', type: 'textarea', label: 'お問い合わせ内容', required: true, placeholder: 'ご用件をお聞かせください' },
  ],
  theme: {
    name: 'minimal',
    primary: '#6366f1',
    bg: '#ffffff',
    text: '#1a1a1a',
    font: "'Inter', sans-serif",
    radius: 12,
    padding: 40,
  },
  settings: {
    thankYouMsg: 'ありがとうございました！',
    sheetsId: '',
    deadline: '',
    maxResponses: '',
  }
};

let nextId = 5;
let activeQuestionId = null;
let draggedId = null;

// ========== Themes ==========
const themes = [
  { name: 'minimal', label: 'ミニマル', primary: '#6366f1', bg: '#ffffff', text: '#1a1a1a', font: "'Inter', sans-serif" },
  { name: 'dark', label: 'ダーク', primary: '#818cf8', bg: '#0f172a', text: '#f1f5f9', font: "'Inter', sans-serif" },
  { name: 'warm', label: 'ウォーム', primary: '#d97706', bg: '#fffbeb', text: '#451a03', font: "'Noto Sans JP', sans-serif" },
  { name: 'nature', label: 'ナチュラル', primary: '#16a34a', bg: '#f0fdf4', text: '#14532d', font: "'Noto Sans JP', sans-serif" },
  { name: 'luxury', label: 'ラグジュアリー', primary: '#c9a84c', bg: '#0a0a0a', text: '#f5f0e8', font: "'Playfair Display', serif" },
  { name: 'tech', label: 'テック', primary: '#06b6d4', bg: '#0c0a09', text: '#e7e5e4', font: "'Space Grotesk', sans-serif" },
  { name: 'sakura', label: 'さくら', primary: '#ec4899', bg: '#fdf2f8', text: '#831843', font: "'Noto Sans JP', sans-serif" },
  { name: 'ocean', label: 'オーシャン', primary: '#0284c7', bg: '#f0f9ff', text: '#0c4a6e', font: "'Inter', sans-serif" },
  { name: 'brutal', label: 'ブルータル', primary: '#000000', bg: '#ffffff', text: '#000000', font: "'Space Grotesk', sans-serif" },
];

// ========== Init ==========
function init() {
  renderThemeGrid();
  renderQuestions();
  updatePreview();
  loadApiKey();
}

// ========== Tabs ==========
function switchTab(tab) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
}

// ========== Theme Grid ==========
function renderThemeGrid() {
  const grid = document.getElementById('themeGrid');
  grid.innerHTML = themes.map(t => `
    <div class="theme-card ${t.name === formState.theme.name ? 'active' : ''}" onclick="applyTheme('${t.name}')">
      <div class="theme-card-inner" style="background:${t.bg}">
        <div style="width:60%;height:6px;background:${t.primary};border-radius:3px;"></div>
        <div style="width:80%;height:4px;background:${t.text};opacity:0.3;border-radius:2px;"></div>
        <div style="width:50%;height:4px;background:${t.text};opacity:0.2;border-radius:2px;"></div>
      </div>
      <div class="theme-card-name">${t.label}</div>
    </div>
  `).join('');
}

function applyTheme(name) {
  const t = themes.find(th => th.name === name);
  if (!t) return;
  formState.theme = { ...formState.theme, name: t.name, primary: t.primary, bg: t.bg, text: t.text, font: t.font };
  document.getElementById('colorPrimary').value = t.primary;
  document.getElementById('colorBg').value = t.bg;
  document.getElementById('colorText').value = t.text;
  document.getElementById('fontSelect').value = t.font;
  renderThemeGrid();
  updatePreview();
}

function updateThemeColor(key, val) {
  formState.theme[key === 'primary' ? 'primary' : key] = val;
  formState.theme.name = 'custom';
  renderThemeGrid();
  updatePreview();
}

function updateFont(val) {
  formState.theme.font = val;
  updatePreview();
}

function updateStyle() {
  formState.theme.radius = parseInt(document.getElementById('borderRadius').value);
  formState.theme.padding = parseInt(document.getElementById('paddingSize').value);
  updatePreview();
}

// ========== Questions ==========
const typeLabels = {
  text: 'テキスト', email: 'メール', tel: '電話', textarea: '長文',
  select: 'ドロップダウン', radio: 'ラジオ', checkbox: 'チェック', date: '日付', number: '数値'
};

const defaultPlaceholders = {
  text: 'テキストを入力', email: 'name@example.com', tel: '090-1234-5678',
  textarea: '自由にお書きください', date: '', number: '0', select: '', radio: '', checkbox: ''
};

function addQuestion(type) {
  const id = 'q' + (nextId++);
  const q = {
    id,
    type,
    label: '新しい質問',
    required: false,
    placeholder: defaultPlaceholders[type] || '',
  };
  if (['select', 'radio', 'checkbox'].includes(type)) {
    q.options = ['選択肢1', '選択肢2', '選択肢3'];
  }
  formState.questions.push(q);
  renderQuestions();
  updatePreview();
  activeQuestionId = id;
  highlightQuestion(id);
}

function removeQuestion(id) {
  formState.questions = formState.questions.filter(q => q.id !== id);
  if (activeQuestionId === id) activeQuestionId = null;
  renderQuestions();
  updatePreview();
}

function duplicateQuestion(id) {
  const orig = formState.questions.find(q => q.id === id);
  if (!orig) return;
  const newQ = { ...JSON.parse(JSON.stringify(orig)), id: 'q' + (nextId++) };
  const idx = formState.questions.findIndex(q => q.id === id);
  formState.questions.splice(idx + 1, 0, newQ);
  renderQuestions();
  updatePreview();
}

function highlightQuestion(id) {
  activeQuestionId = id;
  document.querySelectorAll('.question-card').forEach(c => c.classList.toggle('active', c.dataset.id === id));
}

function renderQuestions() {
  const list = document.getElementById('questionList');
  list.innerHTML = formState.questions.map(q => {
    const hasOptions = ['select', 'radio', 'checkbox'].includes(q.type);
    return `
    <div class="question-card ${q.id === activeQuestionId ? 'active' : ''}"
         data-id="${q.id}"
         draggable="true"
         onclick="highlightQuestion('${q.id}')"
         ondragstart="onDragStart(event,'${q.id}')"
         ondragover="onDragOver(event)"
         ondrop="onDrop(event,'${q.id}')"
         ondragend="onDragEnd(event)"
         ondragenter="event.currentTarget.classList.add('drag-over')"
         ondragleave="event.currentTarget.classList.remove('drag-over')">
      <div class="question-header">
        <span class="question-drag">⠿</span>
        <span class="question-type-badge">${typeLabels[q.type]}</span>
        <div class="question-actions">
          <button class="btn-ghost btn-icon" onclick="event.stopPropagation();duplicateQuestion('${q.id}')" title="複製">⧉</button>
          <button class="btn-danger btn-icon" onclick="event.stopPropagation();removeQuestion('${q.id}')" title="削除">✕</button>
        </div>
      </div>
      <input class="question-label-input" value="${escHtml(q.label)}"
        oninput="updateQuestion('${q.id}','label',this.value)"
        onclick="event.stopPropagation()">
      ${hasOptions ? renderOptionsEditor(q) : ''}
      <div class="question-meta">
        <label>必須
          <label class="toggle">
            <input type="checkbox" ${q.required ? 'checked' : ''} onchange="updateQuestion('${q.id}','required',this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </label>
      </div>
    </div>`;
  }).join('');
}

function renderOptionsEditor(q) {
  return `
    <div class="options-editor">
      ${(q.options||[]).map((opt, i) => `
        <div class="option-row">
          <span style="color:var(--text2);font-size:12px;">${q.type === 'checkbox' ? '☐' : q.type === 'radio' ? '○' : (i+1)+'.'}</span>
          <input class="option-input" value="${escHtml(opt)}"
            oninput="updateOption('${q.id}',${i},this.value)"
            onclick="event.stopPropagation()">
          <button class="btn-ghost" onclick="event.stopPropagation();removeOption('${q.id}',${i})" style="padding:2px 6px;font-size:11px;">✕</button>
        </div>
      `).join('')}
      <button class="add-option-btn" onclick="event.stopPropagation();addOption('${q.id}')">+ 選択肢を追加</button>
    </div>`;
}

function updateQuestion(id, key, val) {
  const q = formState.questions.find(q => q.id === id);
  if (q) { q[key] = val; updatePreview(); }
}

function updateOption(qId, idx, val) {
  const q = formState.questions.find(q => q.id === qId);
  if (q && q.options) { q.options[idx] = val; updatePreview(); }
}

function addOption(qId) {
  const q = formState.questions.find(q => q.id === qId);
  if (q && q.options) { q.options.push('選択肢' + (q.options.length + 1)); renderQuestions(); updatePreview(); }
}

function removeOption(qId, idx) {
  const q = formState.questions.find(q => q.id === qId);
  if (q && q.options && q.options.length > 1) { q.options.splice(idx, 1); renderQuestions(); updatePreview(); }
}

// ========== Drag & Drop ==========
function onDragStart(e, id) {
  draggedId = id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }

function onDrop(e, targetId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedId || draggedId === targetId) return;
  const qs = formState.questions;
  const fromIdx = qs.findIndex(q => q.id === draggedId);
  const toIdx = qs.findIndex(q => q.id === targetId);
  const [moved] = qs.splice(fromIdx, 1);
  qs.splice(toIdx, 0, moved);
  renderQuestions();
  updatePreview();
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  draggedId = null;
}

// ========== Preview ==========
function generateFormHTML(standalone = false) {
  const t = formState.theme;
  const isLight = isLightColor(t.bg);
  const inputBg = isLight ? adjustBrightness(t.bg, -5) : adjustBrightness(t.bg, 15);
  const inputBorder = isLight ? adjustBrightness(t.bg, -15) : adjustBrightness(t.bg, 25);
  const subtextColor = isLight ? adjustBrightness(t.text, 40) : adjustBrightness(t.text, -30);
  const isBrutal = t.name === 'brutal';

  const questionsHTML = formState.questions.map(q => {
    const req = q.required ? '<span style="color:#ef4444;margin-left:4px;">*</span>' : '';
    let input = '';
    switch (q.type) {
      case 'text': case 'email': case 'tel': case 'date': case 'number':
        input = `<input type="${q.type}" name="${q.id}" ${q.required ? 'required' : ''}
          placeholder="${escHtml(q.placeholder || '')}"
          style="width:100%;padding:12px 16px;border:${isBrutal ? '3px solid black' : '1px solid ' + inputBorder};
          border-radius:${isBrutal ? '0' : t.radius/2 + 'px'};background:${inputBg};color:${t.text};
          font-size:15px;outline:none;font-family:${t.font};transition:border-color 0.2s;"
          onfocus="this.style.borderColor='${t.primary}'" onblur="this.style.borderColor='${isBrutal ? 'black' : inputBorder}'">`; break;
      case 'textarea':
        input = `<textarea name="${q.id}" ${q.required ? 'required' : ''} rows="4"
          placeholder="${escHtml(q.placeholder || '')}"
          style="width:100%;padding:12px 16px;border:${isBrutal ? '3px solid black' : '1px solid ' + inputBorder};
          border-radius:${isBrutal ? '0' : t.radius/2 + 'px'};background:${inputBg};color:${t.text};
          font-size:15px;outline:none;resize:vertical;font-family:${t.font};transition:border-color 0.2s;"
          onfocus="this.style.borderColor='${t.primary}'" onblur="this.style.borderColor='${isBrutal ? 'black' : inputBorder}'"></textarea>`; break;
      case 'select':
        input = `<select name="${q.id}" ${q.required ? 'required' : ''}
          style="width:100%;padding:12px 16px;border:${isBrutal ? '3px solid black' : '1px solid ' + inputBorder};
          border-radius:${isBrutal ? '0' : t.radius/2 + 'px'};background:${inputBg};color:${t.text};
          font-size:15px;outline:none;font-family:${t.font};">
          <option value="">選択してください</option>
          ${(q.options||[]).map(o => `<option value="${escHtml(o)}">${escHtml(o)}</option>`).join('')}
        </select>`; break;
      case 'radio': case 'checkbox':
        input = `<div style="display:flex;flex-direction:column;gap:10px;">
          ${(q.options||[]).map(o => `
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;padding:10px 14px;
              border:1px solid ${inputBorder};border-radius:${isBrutal ? '0' : t.radius/2 + 'px'};
              background:${inputBg};transition:all 0.2s;">
              <input type="${q.type}" name="${q.id}" value="${escHtml(o)}"
                style="width:18px;height:18px;accent-color:${t.primary};">
              <span>${escHtml(o)}</span>
            </label>
          `).join('')}
        </div>`; break;
    }

    return `<div style="margin-bottom:24px;">
      <label style="display:block;font-weight:600;margin-bottom:8px;font-size:14px;color:${t.text};">
        ${escHtml(q.label)}${req}
      </label>
      ${input}
    </div>`;
  }).join('');

  const sheetsScript = formState.settings.sheetsId ? `
    // Google Sheets submission
    const SHEET_ID = '${formState.settings.sheetsId}';
    // Add Google Sheets API integration here
  ` : '';

  return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escHtml(formState.title)}</title>
${standalone ? `<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Playfair+Display:wght@700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">` : ''}
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: ${t.font};
    background: ${t.bg};
    color: ${t.text};
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: ${t.padding}px 20px;
    ${isBrutal ? '' : ''}
  }
  .form-container {
    width: 100%;
    max-width: 580px;
    ${isBrutal ? `border: 4px solid black; padding: 40px; background: white;`
     : `background: ${isLight ? t.bg : adjustBrightness(t.bg, 8)}; padding: ${t.padding}px;
        border-radius: ${t.radius}px; box-shadow: 0 4px 40px rgba(0,0,0,${isLight ? '0.08' : '0.3'});`}
  }
  .form-title {
    font-size: ${isBrutal ? '36px' : '28px'};
    font-weight: ${isBrutal ? '900' : '700'};
    margin-bottom: 8px;
    ${isBrutal ? 'text-transform: uppercase; letter-spacing: -1px;' : ''}
    color: ${t.text};
    line-height: 1.2;
  }
  .form-desc {
    font-size: 15px;
    color: ${subtextColor};
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .submit-btn {
    width: 100%;
    padding: 14px 28px;
    background: ${t.primary};
    color: white;
    border: ${isBrutal ? '3px solid black' : 'none'};
    border-radius: ${isBrutal ? '0' : t.radius/2 + 'px'};
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: ${t.font};
    ${isBrutal ? 'text-transform: uppercase; letter-spacing: 2px;' : ''}
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .thank-you {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }
  .thank-you h2 { font-size: 24px; margin-bottom: 12px; }
  .thank-you p { color: ${subtextColor}; }
  .powered-by {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: ${subtextColor};
    opacity: 0.5;
  }
  .powered-by a { color: ${subtextColor}; text-decoration: none; }
  .powered-by a:hover { opacity: 0.8; }
</style>
</head>
<body>
  <div class="form-container">
    <form id="sidForm" onsubmit="handleSubmit(event)">
      <h1 class="form-title">${escHtml(formState.title)}</h1>
      ${formState.description ? `<p class="form-desc">${escHtml(formState.description)}</p>` : ''}
      ${questionsHTML}
      <button type="submit" class="submit-btn">送信する</button>
    </form>
    <div class="thank-you" id="thankYou">
      <h2>${escHtml(formState.settings.thankYouMsg || 'ありがとうございました！')}</h2>
      <p>回答を受け付けました。</p>
    </div>
    <div class="powered-by"><a href="#">Powered by SID Forms</a></div>
  </div>
  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const data = Object.fromEntries(new FormData(form));
      console.log('Form submitted:', data);
      ${sheetsScript}
      form.style.display = 'none';
      document.getElementById('thankYou').style.display = 'block';
    }
  <\/script>
</body>
</html>`;
}

function updatePreview() {
  formState.title = document.getElementById('formTitle').value;
  formState.description = document.getElementById('formDesc').value;
  formState.settings.thankYouMsg = document.getElementById('thankYouMsg')?.value || formState.settings.thankYouMsg;

  const iframe = document.getElementById('previewIframe');
  const html = generateFormHTML(false);
  iframe.srcdoc = html;

  // Auto-resize iframe
  iframe.onload = () => {
    try {
      const h = iframe.contentDocument.documentElement.scrollHeight;
      iframe.style.height = Math.max(600, h + 40) + 'px';
    } catch(e) {}
  };
}

// ========== Device Preview ==========
function setDevice(device) {
  document.querySelectorAll('.device-btn').forEach(b => b.classList.toggle('active', b.dataset.device === device));
  const frame = document.getElementById('previewFrame');
  frame.className = 'preview-frame ' + (device === 'desktop' ? '' : device);
}

// ========== AI Generation ==========
async function generateWithAI() {
  const input = document.getElementById('aiInput');
  const prompt = input.value.trim();
  if (!prompt) return;

  const apiKey = localStorage.getItem('sid_forms_api_key');
  if (!apiKey) {
    showToast('設定タブでClaude APIキーを入力してください', 'error');
    switchTab('settings');
    return;
  }

  const statusEl = document.getElementById('aiStatus');
  statusEl.innerHTML = '<div class="ai-loading"><div class="spinner"></div>AIがフォームを生成中...</div>';
  document.getElementById('aiBtn').disabled = true;

  try {
    const currentState = JSON.stringify({ title: formState.title, description: formState.description, questions: formState.questions.map(q => ({ type: q.type, label: q.label, required: q.required, options: q.options })), theme: formState.theme.name });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2048,
        messages: [{
          role: 'user',
          content: `あなたはフォームビルダーのアシスタントです。ユーザーの指示に基づいてフォームのJSONを生成・修正してください。

現在のフォーム状態:
${currentState}

ユーザーの指示: ${prompt}

以下のJSON形式で回答してください。必ず有効なJSONのみを出力してください（説明文は不要）:
{
  "title": "フォームタイトル",
  "description": "フォームの説明",
  "questions": [
    { "type": "text|email|tel|textarea|select|radio|checkbox|date|number", "label": "質問文", "required": true/false, "placeholder": "プレースホルダー", "options": ["選択肢1"] }
  ],
  "theme": "minimal|dark|warm|nature|luxury|tech|sakura|ocean|brutal"
}`
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API Error: ${response.status}`);
    }

    const data = await response.json();
    const text = data.content[0].text;

    // Parse JSON from response
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AIからの応答をパースできませんでした');

    const result = JSON.parse(jsonMatch[0]);

    // Apply result
    if (result.title) { formState.title = result.title; document.getElementById('formTitle').value = result.title; }
    if (result.description !== undefined) { formState.description = result.description; document.getElementById('formDesc').value = result.description; }
    if (result.questions) {
      formState.questions = result.questions.map((q, i) => ({
        id: 'q' + (nextId++),
        type: q.type || 'text',
        label: q.label || '質問',
        required: q.required || false,
        placeholder: q.placeholder || '',
        options: q.options,
      }));
    }
    if (result.theme) applyTheme(result.theme);

    renderQuestions();
    updatePreview();
    statusEl.innerHTML = '';
    input.value = '';
    showToast('フォームを生成しました', 'success');
  } catch (err) {
    statusEl.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:8px;">${escHtml(err.message)}</div>`;
  } finally {
    document.getElementById('aiBtn').disabled = false;
  }
}

// ========== API Key ==========
function saveApiKey() {
  const key = document.getElementById('apiKey').value;
  if (key) localStorage.setItem('sid_forms_api_key', key);
  else localStorage.removeItem('sid_forms_api_key');
}

function loadApiKey() {
  const key = localStorage.getItem('sid_forms_api_key');
  if (key) document.getElementById('apiKey').value = key;
}

// ========== Export ==========
function exportHTML() {
  const html = generateFormHTML(true);
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (formState.title || 'form') + '.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('HTMLファイルをダウンロードしました', 'success');
  closePublishModal();
}

// ========== Modals ==========
function showPublishModal() { document.getElementById('publishModal').classList.add('active'); }
function closePublishModal() { document.getElementById('publishModal').classList.remove('active'); }

// ========== Toast ==========
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ========== Utilities ==========
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isLightColor(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 128;
}

function adjustBrightness(hex, percent) {
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, Math.max(0, r + Math.round(r * percent / 100)));
  g = Math.min(255, Math.max(0, g + Math.round(g * percent / 100)));
  b = Math.min(255, Math.max(0, b + Math.round(b * percent / 100)));
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2, '0')).join('');
}

// ========== Start ==========
init();
</script>
